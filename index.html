<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shrink Shield — Keith's Superstores</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{--kb:#003087;--kr:#C8102E;}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;}

.tab-btn{transition:all .2s;}
.tab-btn.active{background:#003087;color:#fff;border-bottom:3px solid #C8102E;}

.sub-btn{transition:all .15s;border-bottom:2px solid transparent;}
.sub-btn.active{color:#003087;border-bottom:2px solid #003087;font-weight:700;}

.num-inp{width:70px;border:1px solid #d1d5db;border-radius:6px;padding:4px;text-align:center;}

.lbl{font-size:10px;font-weight:700;color:#6b7280;}
.inp{border:1px solid #d1d5db;border-radius:6px;padding:6px;font-size:13px;}
</style>
</head>

<body>

<div id="loginScreen" class="fixed inset-0 flex items-center justify-center bg-[#003087]">

<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">

<div class="text-center mb-6">
<div class="text-xl font-black tracking-widest text-gray-800">SHRINK SHIELD</div>
<div class="text-sm text-gray-500">Keith's Superstores</div>
</div>

<form id="loginForm" class="space-y-3">

<input id="loginUser" type="text" class="inp w-full" placeholder="Username">

<input id="loginPass" type="password" class="inp w-full" placeholder="Password">

<div id="loginError" class="hidden text-red-600 text-sm text-center"></div>

<button type="submit" class="w-full bg-[#003087] text-white py-3 rounded font-bold">
Sign In
</button>

</form>

</div>
</div>

<div id="appScreen" class="hidden">

<header class="bg-[#003087] text-white px-4 py-3 flex items-center justify-between">

<div class="font-black tracking-widest text-lg">SHRINK SHIELD</div>

<select id="storeSelect" class="text-xs bg-blue-900 text-white border border-blue-700 rounded px-2 py-1.5 w-64">

<option value="s107">#107 — 26181 Hwy 49 S., Saucier</option>
<option value="s108">#108 — Long Beach</option>
<option value="s109">#109 — Pass Christian</option>

</select>

<div id="userChip"></div>

</header>

<div class="max-w-7xl mx-auto px-3 pt-3 pb-10">

<div class="bg-white rounded-b-xl shadow-lg p-4">

<div id="sub-start">

<div class="flex flex-wrap gap-3 mb-4">

<select id="startShiftSel" class="inp w-32">
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
<option>Night</option>
</select>

<input id="startDate" type="date" class="inp w-36">

<input id="startClerk" type="text" class="inp w-40" placeholder="Incoming clerk">

<button onclick="startShift()" class="ml-auto bg-[#003087] text-white px-6 py-2 rounded font-bold">
Start Shift
</button>

</div>

</div>

<div id="sub-end">

<div class="flex gap-3 mb-4">

<select id="endShiftSelect" class="inp w-64">
<option value="">— Select started shift —</option>
</select>

<input id="endClerk" type="text" class="inp w-40" placeholder="Outgoing clerk">

<button onclick="completeShift()" class="ml-auto bg-[#003087] text-white px-6 py-2 rounded font-bold">
Complete Shift
</button>

</div>

</div>

</div>
</div>

<script>

const SUPABASE_URL='https://ylfsqjbqhewpfiooytlg.supabase.co'
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)


// ================= START SHIFT =================
async function startShift(){

const store=document.getElementById('storeSelect').value
const shift=document.getElementById('startShiftSel').value
const date=document.getElementById('startDate').value
const clerk=document.getElementById('startClerk').value

const entry={
id:'shift_'+Date.now(),
store:store,
shift:shift,
date:date,
in_clerk:clerk,
status:'started',
ts_start:Date.now()
}

const {error}=await sb.from('shift_logs').insert([entry])

if(error){
alert(error.message)
return
}

alert("Shift Started")

loadActiveShifts()

}


// ================= FIX #1 =================
// LOAD ACTIVE SHIFTS INTO END SELECT
async function loadActiveShifts(){

const {data,error}=await sb
.from('shift_logs')
.select('*')
.eq('status','started')
.order('ts_start',{ascending:false})

if(error){
console.log(error)
return
}

const sel=document.getElementById('endShiftSelect')

sel.innerHTML='<option value="">— Select started shift —</option>'

data.forEach(s=>{

const opt=document.createElement('option')

opt.value=s.id
opt.textContent=`${s.store} | ${s.shift} | ${s.in_clerk}`

sel.appendChild(opt)

})

}


// ================= FIX #2 =================
// COMPLETE SHIFT
async function completeShift(){

const shiftId=document.getElementById('endShiftSelect').value
const clerk=document.getElementById('endClerk').value

if(!shiftId){
alert("Select a shift")
return
}

const {error}=await sb
.from('shift_logs')
.update({
status:'completed',
out_clerk:clerk,
ts_end:Date.now()
})
.eq('id',shiftId)

if(error){
alert(error.message)
return
}

alert("Shift Completed")

loadActiveShifts()

}


// ================= PAGE LOAD =================
window.addEventListener('DOMContentLoaded',()=>{

loadActiveShifts()

document.getElementById('loginForm').addEventListener('submit',e=>{
e.preventDefault()
document.getElementById('loginScreen').classList.add('hidden')
document.getElementById('appScreen').classList.remove('hidden')
})

})

</script>

</body>
</html>
