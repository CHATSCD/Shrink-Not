<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrink Shield</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@zxing/library@latest"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN SCREEN -->

<div id="loginScreen" class="flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded shadow w-80">

<h1 class="text-xl font-bold text-center mb-4">
Shrink Shield
</h1>

<input id="loginUser" placeholder="Username" class="border p-2 w-full mb-2">

<input id="loginPass" type="password" placeholder="Password" class="border p-2 w-full mb-4">

<button onclick="login()" class="bg-blue-600 text-white w-full p-2 rounded">
Sign In
</button>

</div>

</div>


<!-- MAIN APP -->

<div id="appScreen" class="hidden p-4 space-y-4">

<h1 class="text-xl font-bold">
Shrink Shield Dashboard
</h1>


<!-- STORE SELECT -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-semibold mb-2">Store</h2>

<select id="storeSelect" class="border p-2 w-full"></select>

</div>


<!-- BARCODE SCANNER -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-semibold mb-2">Barcode Scanner</h2>

<video id="scanner" class="w-full rounded"></video>

<button onclick="startScanner()" class="mt-2 bg-green-600 text-white px-4 py-2 rounded">
Start Scanner
</button>

</div>


<!-- SCAN / MANUAL ENTRY -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-semibold mb-2">Scan / Manual Entry</h2>

<input id="barcodeResult" placeholder="Scan or type barcode" class="border p-2 w-full">

<button onclick="manualLookup()" class="mt-2 bg-gray-600 text-white px-4 py-1 rounded">
Lookup Item
</button>

<input id="itemName" placeholder="Item Name" class="border p-2 w-full mt-2">

<input id="itemPrice" placeholder="Price" class="border p-2 w-full mt-2">

<input id="itemQty" type="number" value="1" class="border p-2 w-full mt-2">

<div id="itemInfo" class="mt-2 text-gray-700">
No item scanned
</div>

</div>


<!-- SAVE -->

<div class="bg-white p-4 rounded shadow">

<button onclick="saveShift()" class="bg-blue-600 text-white px-4 py-2 rounded">
Save Scan
</button>

</div>


<!-- ANALYTICS -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-semibold mb-2">Analytics</h2>

<div id="analyticsBox">
Loading...
</div>

</div>

</div>


<script>

/* SUPABASE CONNECTION */

const SUPABASE_URL = "https://ylfsqjbqhewpfiooytlg.supabase.co"

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsZnNxamJxaGV3cGZpb295dGxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzQwODQsImV4cCI6MjA4ODM1MDA4NH0.Ssl5J6ktZIVtLd2cq8vH7PWdR4-yZwI5tt4PtXkVqWk"

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)



/* LOGIN */

async function login(){

const user = document.getElementById("loginUser").value
const pass = document.getElementById("loginPass").value

const { data } = await sb
.from("app_users")
.select("*")
.eq("username", user)
.eq("password", pass)
.single()

if(!data){

alert("Login Failed")
return

}

document.getElementById("loginScreen").classList.add("hidden")
document.getElementById("appScreen").classList.remove("hidden")

loadStores()
loadAnalytics()

}



/* LOAD STORES */

async function loadStores(){

const {data} = await sb.from("stores").select("*")

const select = document.getElementById("storeSelect")

select.innerHTML=""

data.forEach(store=>{

const option = document.createElement("option")

option.value = store.id
option.text = store.name

select.appendChild(option)

})

}



/* BARCODE SCANNER */

const codeReader = new ZXing.BrowserBarcodeReader()

async function startScanner(){

const video = document.getElementById("scanner")

const result = await codeReader.decodeOnceFromVideoDevice(undefined,video)

document.getElementById("barcodeResult").value = result.text

lookupItem(result.text)

}



/* MANUAL LOOKUP */

async function manualLookup(){

const barcode = document.getElementById("barcodeResult").value

lookupItem(barcode)

}



/* LOOKUP ITEM */

async function lookupItem(barcode){

const {data} = await sb
.from("items")
.select("*")
.eq("barcode",barcode)
.single()

if(data){

document.getElementById("itemName").value = data.name
document.getElementById("itemPrice").value = data.price

document.getElementById("itemInfo").innerText =
data.name + " - $" + data.price

}else{

document.getElementById("itemInfo").innerText =
"Item not found — you can add it manually"

}

}



/* SAVE SCAN */

async function saveShift(){

const store = document.getElementById("storeSelect").value
const barcode = document.getElementById("barcodeResult").value
const name = document.getElementById("itemName").value
const price = document.getElementById("itemPrice").value
const qty = document.getElementById("itemQty").value

await sb.from("shift_logs").insert({

id: crypto.randomUUID(),
store: store,
barcode: barcode,
name: name,
price: price,
qty: qty,
date: new Date().toISOString()

})

alert("Scan Saved")

loadAnalytics()

}



/* ANALYTICS */

async function loadAnalytics(){

const {data} = await sb
.from("shift_logs")
.select("*")

document.getElementById("analyticsBox").innerText =
"Total Scans Logged: " + data.length

}

</script>

</body>
</html>
