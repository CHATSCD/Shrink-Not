async function loadStartedShifts() {
  const store = document.getElementById('storeSelect').value;
  const {data, error} = await sb.from('shift_logs').select('*').eq('store', store).eq('status', 'started');
  const select = document.getElementById('endShiftSelect');
  const message = document.getElementById('endShiftMessage');
  const completeBtn = document.getElementById('completeShiftBtn');

  if (error) {
    console.error(error);
    message.textContent = 'Failed to load started shifts.';
    return;
  }

  select.innerHTML = '<option value="">— Select started shift —</option>';
  message.textContent = '';

  if (!data || data.length === 0) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = 'No started shifts available for selected store';
    select.appendChild(opt);
    select.disabled = true;
    completeBtn.disabled = true;
    completeBtn.classList.add('opacity-50', 'cursor-not-allowed');
    message.textContent = 'No shift is currently started, please start a shift first.';
    return;
  }

  select.disabled = false;
  completeBtn.disabled = false;
  completeBtn.classList.remove('opacity-50', 'cursor-not-allowed');

  data.forEach(shift => {
    const opt = document.createElement('option');
    opt.value = shift.id;
    opt.textContent = `${shift.shift} ${shift.date} - ${shift.in_clerk}`;
    select.appendChild(opt);
  });
}

async function startShift(){

const store=document.getElementById('storeSelect').value
const shift=document.getElementById('startShiftSel').value
const date=document.getElementById('startDate').value
const clerk=document.getElementById('startClerk').value

if (!store || !shift || !date || !clerk.trim()) {
  alert('Please fill in store, shift, date, and incoming clerk before starting.');
  return;
}

const startButton = document.getElementById('startShiftBtn');
if (startButton) startButton.disabled = true;

const kratom = {};
KRATOM.forEach(p => {
  kratom[p.id] = {
    ob: parseInt(document.getElementById(`ob-${p.id}`).value) || 0,
    oc: parseInt(document.getElementById(`oc-${p.id}`).value) || 0,
    fb: parseInt(document.getElementById(`fb-${p.id}`).value) || 0,
    fc: parseInt(document.getElementById(`fc-${p.id}`).value) || 0,
  };
});

const entry={
 id:'shift_'+Date.now(),
 store:store,
 shift:shift,
 date:date,
 in_clerk:clerk.trim(),
 status:'started',
 ts_start:Date.now(),
 kratom_start: kratom
}

const {error}=await sb.from('shift_logs').insert([entry])

if(error){
  alert(error.message)
  if (startButton) startButton.disabled = false;
  return
}

alert("Shift Started")
loadStartedShifts();
if (startButton) startButton.disabled = false;
}

async function completeShift() {
  const shiftId = document.getElementById('endShiftSelect').value;
  const clerk = document.getElementById('endClerk').value;
  const shiftMessage = document.getElementById('endShiftMessage');

  if (!shiftId) {
    alert('Select a started shift to complete.');
    return;
  }
  if (!clerk.trim()) {
    alert('Enter the outgoing clerk name.');
    return;
  }

  const completeBtn = document.getElementById('completeShiftBtn');
  if (completeBtn) {
    completeBtn.disabled = true;
    completeBtn.classList.add('opacity-50', 'cursor-not-allowed');
  }

  const kratom_end = {};
  KRATOM.forEach(p => {
    kratom_end[p.id] = {
      ob: parseInt(document.getElementById(`end-ob-${p.id}`).value) || 0,
      oc: parseInt(document.getElementById(`end-oc-${p.id}`).value) || 0,
      fb: parseInt(document.getElementById(`end-fb-${p.id}`).value) || 0,
      fc: parseInt(document.getElementById(`end-fc-${p.id}`).value) || 0,
      sales: parseInt(document.getElementById(`end-sales-${p.id}`).value) || 0,
    };
  });

  const {error} = await sb.from('shift_logs').update({
    out_clerk: clerk.trim(),
    kratom_end: kratom_end,
    status: 'completed',
    ts_end: Date.now()
  }).eq('id', shiftId);

  if (error) {
    alert(error.message);
    if (shiftMessage) shiftMessage.textContent = 'Could not complete shift. Try again.';
    if (completeBtn) {
      completeBtn.disabled = false;
      completeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
    }
    return;
  }

  alert('Shift completed');
  if (shiftMessage) shiftMessage.textContent = 'Shift completed successfully.';
  loadStartedShifts();
  if (completeBtn) {
    completeBtn.disabled = false;
    completeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
  }
}

let analyticsChart;
let analyticsCache = [];

async function loadAnalytics() {
  const {data, error} = await sb.from('shift_logs').select('*').eq('status', 'completed').order('ts_end', {ascending: false});
  if (error) {
    console.error(error);
    document.getElementById('analyticsSummary').innerHTML = '<div class="text-red-600">Failed to load analytics.</div>';
    return;
  }

  const totalShifts = data.length;
  let totalSales = 0;
  let totalShrink = 0;

  const byShift = {};
  const byStore = {};
  const shrinkByStore = {};
  const clerkShrink = {};

  data.forEach(shift => {
    byShift[shift.shift] = (byShift[shift.shift] || 0) + 1;
    byStore[shift.store] = (byStore[shift.store] || 0) + 1;

    const endData = shift.kratom_end || {};
    const startData = shift.kratom_start || {};

    const shiftSales = Object.values(endData).reduce((s, product) => s + (product.sales || 0), 0);
    totalSales += shiftSales;

    let shiftShrink = 0;
    Object.keys(startData).forEach(key => {
      const startProduct = startData[key] || {};
      const endProduct = endData[key] || {ob:0,oc:0,fb:0,fc:0,sales:0};
      const startQty = (startProduct.ob||0) + (startProduct.oc||0) + (startProduct.fb||0) + (startProduct.fc||0);
      const endQty = (endProduct.ob||0) + (endProduct.oc||0) + (endProduct.fb||0) + (endProduct.fc||0);
      const salesQty = (endProduct.sales||0);
      shiftShrink += (startQty - endQty - salesQty);
    });

    totalShrink += shiftShrink;
    shrinkByStore[shift.store] = (shrinkByStore[shift.store] || 0) + shiftShrink;

    const clerk = (shift.out_clerk || shift.in_clerk || 'Unknown').trim();
    clerkShrink[clerk] = (clerkShrink[clerk] || 0) + shiftShrink;
  });

  const avgShift = totalShifts ? (totalSales / totalShifts).toFixed(2) : 0;

  const summary = document.getElementById('analyticsSummary');
  summary.innerHTML = `
  <div class="p-3 border rounded bg-white"><strong>Total completed shifts</strong><br>${totalShifts}</div>
  <div class="p-3 border rounded bg-white"><strong>Total sales</strong><br>${totalSales}</div>
  <div class="p-3 border rounded bg-white"><strong>Avg sales / shift</strong><br>${avgShift}</div>
  <div class="p-3 border rounded bg-white"><strong>Total shrink (units)</strong><br>${totalShrink.toFixed(2)}</div>
  <div class="p-3 border rounded bg-white"><strong>Stores tracked</strong><br>${Object.keys(byStore).length}</div>
  `;

  const topClerksEl = document.getElementById('topClerks');
  const topClerks = Object.entries(clerkShrink)
    .sort(([,a],[,b]) => b - a)
    .filter(([,value]) => value > 0)
    .slice(0,5);

  if (topClerks.length > 0) {
    topClerksEl.innerHTML = '<h4 class="font-bold mb-2">Top 5 clerks by shrink</h4>' +
      '<ol class="list-decimal list-inside text-sm text-gray-700">' +
      topClerks.map(([clerk, value]) => `<li>${clerk}: ${value.toFixed(2)} units</li>`).join('') +
      '</ol>';
  } else {
    topClerksEl.innerHTML = '<div class="text-sm text-gray-500">No clerk shrink records yet.</div>';
  }

  analyticsCache = data;

  const ctx = document.getElementById('analyticsChart');
  const labels = Object.keys(shrinkByStore).sort();
  const values = labels.map(store => shrinkByStore[store]);

  if (analyticsChart) analyticsChart.destroy();

  analyticsChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Shrink units by store',
        data: values,
        backgroundColor: 'rgba(220, 38, 38, 0.65)',
      }]
    },
    options: {
      responsive: true,
      plugins: {title: {display: true, text: 'Shrink (loss) by store'}}
    }
  });
}

function exportAnalytics() {
  if (!analyticsCache.length) {
    alert('No analytics data available to export.');
    return;
  }

  const headers = ['store','shift','date','in_clerk','out_clerk','total_sales','total_shrink'];
  const rows = analyticsCache.map(shift => {
    const endData = shift.kratom_end || {};
    const startData = shift.kratom_start || {};

    const totalSales = Object.values(endData).reduce((s, p) => s + (p.sales || 0), 0);
    let totalShrink = 0;
    Object.keys(startData).forEach(key => {
      const startProduct = startData[key] || {};
      const endProduct = endData[key] || {ob:0,oc:0,fb:0,fc:0,sales:0};
      const startQty = (startProduct.ob||0)+(startProduct.oc||0)+(startProduct.fb||0)+(startProduct.fc||0);
      const endQty = (endProduct.ob||0)+(endProduct.oc||0)+(endProduct.fb||0)+(endProduct.fc||0);
      const salesQty=(endProduct.sales||0);
      totalShrink += (startQty-endQty-salesQty);
    });

    return [
      shift.store,
      shift.shift,
      shift.date,
      shift.in_clerk || '',
      shift.out_clerk || '',
      totalSales,
      totalShrink.toFixed(2)
    ];
  });

  const csvLines = [headers.join(','), ...rows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(','))];
  const csvContent = csvLines.join('\n');
  const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `shrink_analytics_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(link);
  link.click();

}
