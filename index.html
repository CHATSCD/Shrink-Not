<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrink Shield</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@zxing/library@latest"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN -->

<div id="loginScreen" class="flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded shadow w-80">

<h1 class="text-xl font-bold text-center mb-4">Shrink Shield</h1>

<input id="loginUser" placeholder="Username" class="border p-2 w-full mb-2">
<input id="loginPass" type="password" placeholder="Password" class="border p-2 w-full mb-4">

<button onclick="login()" class="bg-blue-600 text-white w-full p-2 rounded">
Sign In
</button>

</div>
</div>


<!-- APP -->

<div id="appScreen" class="hidden">

<!-- NAV BAR -->

<div class="bg-black text-white p-3 flex gap-4">

<button onclick="showPage('scanner')">Scanner</button>
<button onclick="showPage('manual')">Manual</button>
<button onclick="showPage('inventory')">Inventory</button>
<button onclick="showPage('analytics')">Analytics</button>
<button onclick="showPage('admin')">Admin</button>

</div>


<div class="p-4 space-y-4">

<!-- STORE -->

<div class="bg-white p-4 rounded shadow">

<select id="storeSelect" class="border p-2 w-full"></select>

</div>


<!-- SCANNER PAGE -->

<div id="scannerPage">

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-2">Scanner</h2>

<video id="scanner" class="w-full rounded"></video>

<button onclick="startScanner()" class="mt-2 bg-green-600 text-white px-4 py-2 rounded">
Start Scanner
</button>

<input id="barcodeResult" class="border p-2 w-full mt-2">

<input id="scanQty" type="number" value="1" class="border p-2 w-full mt-2">

<button onclick="saveScan()" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded">
Save Scan
</button>

</div>

</div>


<!-- MANUAL PAGE -->

<div id="manualPage" class="hidden">

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-2">Manual Entry</h2>

<input id="manualBarcode" placeholder="Barcode" class="border p-2 w-full mb-2">

<input id="manualName" placeholder="Item Name" class="border p-2 w-full mb-2">

<input id="manualPrice" placeholder="Price" class="border p-2 w-full mb-2">

<input id="manualQty" type="number" value="1" class="border p-2 w-full mb-2">

<button onclick="saveManual()" class="bg-blue-600 text-white px-4 py-2 rounded">
Save Item
</button>

</div>

</div>


<!-- INVENTORY PAGE -->

<div id="inventoryPage" class="hidden">

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-2">Inventory</h2>

<table class="w-full">

<thead>
<tr class="border-b">
<th>Barcode</th>
<th>Name</th>
<th>Qty</th>
</tr>
</thead>

<tbody id="inventoryTable"></tbody>

</table>

<button onclick="loadInventory()" class="mt-3 bg-gray-700 text-white px-3 py-1 rounded">
Refresh
</button>

</div>

</div>


<!-- ANALYTICS PAGE -->

<div id="analyticsPage" class="hidden">

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-2">Analytics</h2>

<div id="analyticsBox"></div>

</div>

</div>


<!-- ADMIN PAGE -->

<div id="adminPage" class="hidden">

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-2">Admin Panel</h2>

<button onclick="loadInventory()" class="bg-purple-600 text-white px-3 py-1 rounded">
Load Inventory
</button>

</div>

</div>

</div>
</div>



<script>

/* SUPABASE */

const SUPABASE_URL = "https://ylfsqjbqhewpfiooytlg.supabase.co"

const SUPABASE_KEY = "YOUR_KEY"

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)



/* LOGIN */

async function login(email, password) {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  })

  if (error) {
    alert(error.message)
    return
  }

  document.getElementById("loginScreen").style.display = "none"
  document.getElementById("app").style.display = "block"
}

loadStores()
loadAnalytics()

}



/* NAVIGATION */

function showPage(page){

document.querySelectorAll("[id$='Page']")
.forEach(p=>p.classList.add("hidden"))

document.getElementById(page+"Page").classList.remove("hidden")

}



/* LOAD STORES */

async function loadStores(){

const {data} = await sb.from("stores").select("*")

const select = document.getElementById("storeSelect")

select.innerHTML=""

data.forEach(store=>{

const option=document.createElement("option")

option.value=store.id
option.text=store.name

select.appendChild(option)

})

}



/* SCANNER */

const codeReader=new ZXing.BrowserBarcodeReader()

async function startScanner(){

const video=document.getElementById("scanner")

const result=await codeReader.decodeOnceFromVideoDevice(undefined,video)

document.getElementById("barcodeResult").value=result.text

}



/* SAVE SCAN */

async function saveScan(){

const store=document.getElementById("storeSelect").value
const barcode=document.getElementById("barcodeResult").value
const qty=document.getElementById("scanQty").value

await sb.from("shift_logs").insert({

id:crypto.randomUUID(),
store:store,
barcode:barcode,
qty:qty,
date:new Date().toISOString()

})

alert("Saved")

loadAnalytics()

}



/* MANUAL SAVE */

async function saveManual(){

const barcode=document.getElementById("manualBarcode").value
const name=document.getElementById("manualName").value
const price=document.getElementById("manualPrice").value
const qty=document.getElementById("manualQty").value

await sb.from("items").insert({

barcode:barcode,
name:name,
price:price,
qty:qty

})

alert("Item Added")

}



/* LOAD INVENTORY */

async function loadInventory(){

const {data}=await sb.from("items").select("*")

let table=document.getElementById("inventoryTable")

table.innerHTML=""

data.forEach(i=>{

table.innerHTML+=`
<tr>
<td>${i.barcode}</td>
<td>${i.name}</td>
<td>${i.qty || 0}</td>
</tr>
`

})

}



/* ANALYTICS */

async function loadAnalytics(){

const {data}=await sb.from("shift_logs").select("*")

document.getElementById("analyticsBox").innerText=
"Total Scans Logged: "+data.length

}

</script>

</body>
</html>
