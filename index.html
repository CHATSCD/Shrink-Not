<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Performance Optimized Page</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        .loading { display: none; text-align: center; padding: 20px; }\n        .error { color: red; text-align: center; }\n    </style>\n</head>\n<body>\n    <div class="loading" id="loading">Loading...</div>\n    <div id="content">\n        <h1>Welcome to the Optimized Page</h1>\n        <p>This page is built with performance and user experience in mind.</p>\n    </div>\n    <script>\n        const loadingElement = document.getElementById('loading');\n        const contentElement = document.getElementById('content');\n        loadingElement.style.display = 'block';\n\n        // Simulate data load with error handling\n        async function fetchData() {\n            try {\n                // Simulate fetching data\n                let response = await new Promise((resolve, reject) => {\n                    setTimeout(() => { resolve('Data loaded!'); }, 2000);\n                    // Uncomment the next line to simulate an error\n                    // reject('Failed to load data.');\n                });\n                contentElement.innerHTML += `<p>${response}</p>`;\n            } catch (error) {\n                contentElement.innerHTML = `<p class='error'>${error}</p>`;\n            } finally {\n                loadingElement.style.display = 'none';\n            }\n        }\n\n        fetchData();\n    <\/script>\n</body>\n</html>
