<script>

const SUPABASE_URL='https://ylfsqjbqhewpfiooytlg.supabase.co'
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsZnNxamJxaGV3cGZpb295dGxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzQwODQsImV4cCI6MjA4ODM1MDA4NH0.Ssl5J6ktZIVtLd2cq8vH7PWdR4-yZwI5tt4PtXkVqWk'

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

// ================ COUNT DATA ================
const KRATOM = [
  {id:'k1',name:'Viva Zen Ultimate'},
  {id:'k2',name:'Viva Zen Red Top'},
  {id:'k3',name:'Viva Zen Silver Top'},
  {id:'k4',name:'Kryptic Kratom Relaxation'},
  {id:'k5',name:'Good Mood'},
  {id:'k6',name:'Viva Zen yellow Top'},
  {id:'k7',name:'K-Shot'},
  {id:'k8',name:'feel free'}
];


function buildStartKratomTable(){

const tbody=document.getElementById('startKratomBody')
tbody.innerHTML=''

KRATOM.forEach(p=>{

const tr=document.createElement('tr')

tr.innerHTML=`
<td>${p.name}</td>
<td><input id="ob-${p.id}" class="num-inp" type="number" value="0"></td>
<td><input id="oc-${p.id}" class="num-inp" type="number" value="0"></td>
<td><input id="fb-${p.id}" class="num-inp" type="number" value="0"></td>
<td><input id="fc-${p.id}" class="num-inp" type="number" value="0"></td>
`

tbody.appendChild(tr)

})

}

function renderEndKratomTable(){

const tbody=document.getElementById('endKratomBody')
tbody.innerHTML=''

KRATOM.forEach(p=>{

const tr=document.createElement('tr')

tr.innerHTML=`
<td>${p.name}</td>
<td><input id="end-ob-${p.id}" class="num-inp" type="number" value="0"></td>
<td><input id="end-oc-${p.id}" class="num-inp" type="number" value="0"></td>
<td><input id="end-fb-${p.id}" class="num-inp" type="number" value="0"></td>
<td><input id="end-fc-${p.id}" class="num-inp" type="number" value="0"></td>
<td><input id="end-sales-${p.id}" class="num-inp" type="number" value="0"></td>
`

tbody.appendChild(tr)

})

}

function showTab(tab){

document.getElementById('tab-count').classList.toggle('hidden',tab!=='count')
document.getElementById('tab-review').classList.toggle('hidden',tab!=='review')
document.getElementById('tab-admin').classList.toggle('hidden',tab!=='admin')

}

function showCountSub(type){

const start=type==='start'

document.getElementById('sub-start').classList.toggle('hidden',!start)
document.getElementById('sub-end').classList.toggle('hidden',start)

}

async function startShift(){

const store=document.getElementById('storeSelect').value
const shift=document.getElementById('startShiftSel').value
const date=document.getElementById('startDate').value
const clerk=document.getElementById('startClerk').value

const entry={
id:'shift_'+Date.now(),
store:store,
shift:shift,
date:date,
in_clerk:clerk,
status:'started',
ts_start:Date.now(),
kratom:{}
}

const {error}=await sb.from('shift_logs').insert([entry])

if(error){
alert(error.message)
return
}

alert("Shift Started")

}

window.addEventListener('DOMContentLoaded',()=>{

buildStartKratomTable()
renderEndKratomTable()

document.getElementById('loginForm').addEventListener('submit',e=>{
e.preventDefault()
document.getElementById('loginScreen').classList.add('hidden')
document.getElementById('appScreen').classList.remove('hidden')
})

})

</script>
